spring:
 datasource:
   url: jdbc:mysql://localhost:3306/coursedb?createDatabaseIfNotExist=true
   username: root
   password: password
 jpa:
   show-sql: true
   properties:
     hibernate:
       format_sql: true
 flyway:
   enabled: true
   locations: classpath:db/migration
server:
 port: 9051
eureka:
 client:
   service-url:
     defaultZone: http://localhost:8761/eureka/
 instance:
   prefer-ip-address: true
management:
 endpoints:
   web:
     exposure:
       include: "*"
 endpoint:
   health:
     show-details: always
 metrics:
   export:
     prometheus:
       enabled: true    
